<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>
body{
  font-family: Arial, sans-serif;
  background:#DFEAF2;
  margin:0;
  padding:0;
}


.contact-section{
  padding-top:80px; 
  min-height:100vh;
  display:flex;
  align-items:center;
}


.need-help{
  color:#ffb400;
  font-weight:600;
  letter-spacing:2px;
  font-size:14px;
}

.contact-left h2{
  font-weight:700;
  margin:15px 0;
  font-size:36px;
  line-height:1.3;
}

.contact-left p{
  margin:5px 0;
  color:#333;
  font-size:16px;
}

/* Form Card */
.contact-card{
  background:#f7f7f7;
  padding:40px;
  border-radius:6px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.contact-card label{
  font-weight:600;
}

.contact-card input,
.contact-card textarea{
  background:#eee;
  border:none;
  border-radius:4px;
  padding:12px;
  width:100%;
}

.contact-card textarea{
  resize:none;
  height:120px;
}

.btn-submit{
  background:#FF9A78;
  border:none;
  padding:14px;
  font-weight:600;
  width:100%;
  color:#fff;
}

.btn-submit:hover{
  background:#FC8156;
  color:#fff;
}

@media (max-width: 767px){

 
  .navbar-collapse{
    text-align: left;
  }

  .navbar-nav{
    display: block;
    width: auto;
    text-align: left;
  }
  .navbar-nav .nav-item{
    margin: 5px 0;
  }

  
  .navbar-nav .nav-link{
    padding-left: 0;
  }

  .contact-section{
    padding-top: 120px;
  }
}
</style>
</head>

<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">

<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#myNav">
<span class="navbar-toggler-icon"></span>
</button>

<div id="myNav" class="collapse navbar-collapse">
<ul class="navbar-nav">

<li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
<li class="nav-item"><a href="about us.html" class="nav-link">About Us</a></li>
<li class="nav-item"><a href="explore places.html" class="nav-link">Explore Places</a></li>
<li class="nav-item"><a href="packages.html" class="nav-link">Packages</a></li>
<li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>

</ul>
</div>
</nav>

<!-- CONTACT SECTION -->
<section class="contact-section">
  <div class="container">
    <div class="row align-items-center">

      <!-- LEFT CONTENT -->
      <div class="col-md-6 contact-left mb-4">
        <span class="need-help">CONTACT INFORMATION</span>
        <h3>Say hi, and let's start a good conversation.</h3>

        <p><strong>Address:</strong> Hyderabad</p>
        <p><strong>Email:</strong> thedestination10@gmail.com</p>
        <p><strong>Phone:</strong> +91 9502378359</p>
      </div>

      <!-- RIGHT FORM -->
      <div class="col-md-6">
        <div class="contact-card">

          <form>
            <div class="form-row">
              <div class="form-group col-md-6">
                <label>Name</label>
                <input type="text" class="form-control" placeholder="Name">
              </div>

              <div class="form-group col-md-6">
                <label>Phone</label>
                <input type="text" class="form-control" placeholder="Phone">
              </div>
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" placeholder="Email">
            </div>

            <div class="form-group">
              <label>Message</label>
              <textarea class="form-control" placeholder="Message"></textarea>
            </div>

            <button type="submit" class="btn btn-submit">✈ Submit</button>
          </form>

        </div>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();
</script>
</body>
</html>
