<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Carousel</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>
body{
    margin:0;
    padding:0;
    overflow-x:hidden;
}

/* Fix navbar overlap */
.carousel-wrapper{
    margin-top: 56px;
}

/* Carousel image responsive */
.carousel-item img{
    width: 100%;
    height: 90vh;         
    object-fit: cover;    
}

/* Mobile view */
@media (max-width: 768px){
    .carousel-item img{
        height: 45vh;
    }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">

<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#myNav">
<span class="navbar-toggler-icon"></span>
</button>

<div id="myNav" class="collapse navbar-collapse">
<ul class="navbar-nav">

<li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
<li class="nav-item"><a href="about us.html" class="nav-link">About</a></li>
<li class="nav-item"><a href="explore places.html" class="nav-link">Explore Places</a></li>
<li class="nav-item"><a href="packages.html" class="nav-link">Packages</a></li>
<li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>

</ul>
</div>
</nav>

<!-- CAROUSEL -->
<div class="carousel-wrapper">
<div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">

<!-- indicators -->
<ul class="carousel-indicators">
  <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
  <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
  <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
</ul>

<!-- slides -->
<div class="carousel-inner">
  <div class="carousel-item active">
    <img src="kerala2.jpeg" width=100% height=585px>
  </div>
  <div class="carousel-item">
    <img src="himachal pradesh1.jpeg" width=100% height=585px>
  </div>
  <div class="carousel-item">
    <img src="rajasthan1.jpeg" width=100% height=585px>
  </div>
</div>

<!-- controls -->
<a class="carousel-control-prev" href="#carouselExampleIndicators" data-slide="prev">
  <span class="carousel-control-prev-icon"></span>
</a>

<a class="carousel-control-next" href="#carouselExampleIndicators" data-slide="next">
  <span class="carousel-control-next-icon"></span>
</a>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
